# chonk — example configuration
# MIGRATION MARKER: Mirrors work/configs/base.toml (TOML → YAML for Go).
# The YAML schema is intentionally compatible with the Python config schema.

# ── Storage ───────────────────────────────────────────────────────────────────
store:
  # DuckDB (default — local dev / single-process)
  path: "./index.duckdb"
  embedding_dim: 1024

  # PostgreSQL (horizontal scale — uncomment and set DSN to enable)
  # dsn: "postgresql://user:password@localhost:5432/chonk"

# ── Embeddings ────────────────────────────────────────────────────────────────
embed:
  # Together.ai embedding model — must match embedding_dim above.
  # "BAAI/bge-large-en-v1.5" produces 1024-dim embeddings.
  model: "BAAI/bge-large-en-v1.5"
  batch_size: 256
  # API key — prefer TOGETHER_API_KEY environment variable over storing here.
  api_key: ""

# ── Loader (chunking) ────────────────────────────────────────────────────────
loader:
  min_chunk_size: 1100
  max_chunk_size: 2200
  enrich_context: true

# ── Index (NER / graph / community) ─────────────────────────────────────────
index:
  ner: true
  community: true
  svo: false
  # spacy_model is ignored — spaCy replaced by Together.ai NER
  svo_model: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
  community_alpha: 0.2
  community_sim_threshold: 0.6

# ── Sources (optional — used by `chonk ingest`) ───────────────────────────────
sources:
  # Glob: ingest all markdown files from a directory
  # - type: glob
  #   path: "./docs"
  #   pattern: "**/*.md"

  # JSON array: ingest records from a JSON file
  # - type: json_array
  #   path: "./data/records.json"
  #   array_field: "items"
  #   id_path: "id"

# ── Namespaces (optional) ────────────────────────────────────────────────────
namespaces: {}

# ── Search (optional — overrides for EnhancedSearch) ─────────────────────────
search:
  seed_pool_multiplier: 3
  entity_expansion_top_n: 3
  lambda_diversity: 0.3
  relevance_weight: 0.5
  priority_weight: 0.2
  coverage_weight: 0.3
