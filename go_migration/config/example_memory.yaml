# chonk — in-memory configuration (for testing / CI without a persistent store)
store:
  path: ":memory:"
  embedding_dim: 1024

embed:
  model: "BAAI/bge-large-en-v1.5"
  batch_size: 256

loader:
  min_chunk_size: 600
  max_chunk_size: 1500
  enrich_context: false

index:
  ner: false
  community: false
  svo: false
