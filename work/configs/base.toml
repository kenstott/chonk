# Base config — all runs extend this

# ── Data sources ─────────────────────────────────────────────────────────────
# Each [[source]] entry describes one data source to crawl and index.
# Sources are processed in order. Omit this section if you supply a
# pre-built corpus externally (e.g. via cmd_download for the benchmark).
#
# Namespace/domain convention:
#   global.toml defines shared sources with namespace = "global". These are
#   always included when resolving domains via store.resolve_session().
#   User configs use extends = "global.toml" and add their own sources with
#   namespace = "user:{id}" (or any custom namespace). The extends chain and
#   the namespace hierarchy are isomorphic: parent config → "global" namespace,
#   child config → user-specific namespace.
#
# type = "directory"    → DirectoryCrawler
# type = "github"       → GitHubCrawler
# type = "web"          → WebCrawler
# type = "db_schema"    → DatabaseSchemaCrawler
# type = "sharepoint"   → SharePointCrawler
# type = "gmail"        → GmailCrawler
# type = "s3"           → S3Transport
# type = "http"         → HttpTransport (single URL fetch)
# type = "sql_query"    → SqlQueryTransport
#
# [[source]]
# type       = "directory"
# uri        = "/path/to/docs"
# extensions = [".md", ".txt", ".pdf"]
# recursive  = true
# max_files  = 1000
# namespace  = "global"         # global.toml sources use namespace = "global"
# domain     = "my_domain"      # optional; paired with namespace to register in domains table; restricts retrieval when --domain-ids is set
#
# [[source]]
# type      = "github"
# uri       = "https://github.com/myorg/myrepo"
# branch    = "main"
# extensions = [".py", ".md"]
# namespace  = "global"         # shared repo available to all users
# domain     = "engineering"
#
# [[source]]
# type             = "db_schema"
# uri              = "postgresql://user:pass@host/db"
# include_procs    = true
# include_views    = true
# schemas          = ["public", "analytics"]
# namespace        = "global"
# domain           = "schema"
#
# [[source]]
# type         = "sharepoint"
# uri          = "https://myorg.sharepoint.com/sites/mysite"
# auth_mode    = "azure_ad"     # or "user_password"
# artifacts    = ["documents", "lists", "pages"]
# namespace    = "global"
# domain       = "intranet"
#
# [[source]]
# type        = "web"
# uri         = "https://docs.example.com"
# max_pages   = 100
# max_depth   = 3
# same_domain = true
# namespace   = "global"
# domain      = "public_docs"
#
# [[source]]
# type      = "gmail"
# uri       = "gmail://inbox"
# query     = "label:important after:2024/01/01"
# limit     = 500
# namespace = "user:alice"      # user-specific sources use namespace = "user:{id}"
# domain    = "email"
#
# [[source]]
# type      = "sql_query"
# uri       = "sqlquery://my_report"
# sql       = "SELECT title || ' ' || body AS content FROM articles"
# namespace = "global"
# domain    = "reports"

# ── Entity vocabulary ────────────────────────────────────────────────────────
# Augments spaCy NER with domain-specific named entities. Each entry is merged
# into the SchemaVocabBuilder before NER runs. Requires --with-schema-vocab or
# [index.features] schema_vocab = true to activate the combined matcher.
#
# type = "static"    → add a fixed list of names verbatim (case-insensitive)
# type = "db_query"  → execute SQL and add result values as entity vocabulary
#
# [[vocab.entities]]
# type        = "static"
# entity_type = "customer"
# names       = ["Acme Corp", "Globex Inc", "Initech"]
#
# [[vocab.entities]]
# type        = "db_query"
# entity_type = "employee"
# connection  = "postgresql://user:pass@host/db"
# sql         = "SELECT full_name FROM employees WHERE active = true"
#
# [[vocab.entities]]
# type        = "db_query"
# entity_type = "product"
# connection  = "postgresql://user:pass@host/db"
# sql         = "SELECT product_name FROM products"

# ── Index settings ────────────────────────────────────────────────────────────
[index]
out_dir             = "work"
db_name             = "chunkymonkey_nobc_1100_2200.duckdb"
embed_model         = "BAAI/bge-large-en-v1.5"
spacy_model         = "en_core_web_sm"
min_chunk           = 1100
max_chunk           = 2200
embed_content_only  = true

[index.features]
ner             = true
ner_embeddings  = true
schema_vocab    = false   # set true when sources include db_schema or api types
community       = true
svo             = false   # LLM-based; set gen.* when enabling

# ── Reranker ──────────────────────────────────────────────────────────────────
[rerank]
enabled   = false
provider  = "local"       # local | together | cohere
model     = "BAAI/bge-reranker-large"

# ── Retrieval ─────────────────────────────────────────────────────────────────
[retrieval]
top_k                   = 5
fetch_k                 = 50
search_mode             = "vector_first"   # vector_first | graph_first | global
enhanced                = false
entity_ref_expansion    = false
lane_entity_min_sim     = null
redundancy_threshold    = null
cluster                 = false
vanilla                 = false

[retrieval.community]
enabled         = false
min_coherence   = 0.5

# ── Generation ────────────────────────────────────────────────────────────────
[gen]
provider     = "openai"    # openai | together | anthropic
model        = "gpt-4o-mini"
temperature  = 0.0

# ── Structured Response (SR) ──────────────────────────────────────────────────
[sr]
enabled = false            # JSON schema output (key_claims + evidence_used)

# ── Structured Response Retry (SRR) ──────────────────────────────────────────
[srr]
enabled   = false          # SR + coverage check + gap-fill (up to 2 rounds)
provider  = null           # null = same as gen.provider
model     = null           # null = same as gen.model; use cheaper model here

# ── Evaluation ────────────────────────────────────────────────────────────────
[eval]
judge       = "gpt-4o-mini"
rpm         = 8000
batch_size  = 20
concurrency = 50
nan_limit   = 136
